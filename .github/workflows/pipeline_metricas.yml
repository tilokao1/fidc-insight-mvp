name: Pipeline Criação de Métricas FIDC

on:
  schedule:
    # Roda automaticamente todo dia 10 do mês à 2h da manhã (UTC)
    - cron: '0 2 10 * *'
  workflow_dispatch: # Permite rodar MANUALMENTE e independente da extração

jobs:
  gerar-metricas:
    runs-on: ubuntu-latest
    
    # Silenciar o aviso amarelo do Node.js
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: 1. Baixar o código do repositório
      uses: actions/checkout@v4

    - name: 2. Preparar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. Instalar Dependências (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: 4. Executar Scripts de Métricas - Score 1 Métrica 1.1
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_score_1.1.py

    - name: 5. Executar Scripts de Métricas - Score 1 Métrica 1.2
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_score_1.2.py
  
    - name: 6. Executar Scripts de Métricas - Score 1 Métrica 1.3
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_score_1.3.py

    - name: 7. Executar Scripts de Métricas - Score 1 Métrica 1.4
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_score_1.4.py

    - name: 8. Executar Scripts de Métricas - Score 2
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/motor_score_2_liquidez.py

    - name: 9. Executar Scripts de Métricas - Score 3.1
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_cedentes.py     

    - name: 10. Executar Scripts de Métricas - Score 3.2
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_setorial.py 

    - name: 11. Executar Scripts de Métricas - Score 4
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metricas_score_4.py

    - name: 12. Executar Script de Verificação de Processos Sancionadores
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/metrica_score_admin_process.py

    # Retirada momentaneamente do script de metricas para ajuste de performance. Irá retornar posteriormente.
    # - name: 8. Executar Scripts de Métricas - Módulo 2 "Performance & Value Analyzer"; Matriz de Risco vs. Retorno.
    #   env:
    #     DATABASE_URL: ${{ secrets.DATABASE_URL }}
    #   run: python scripts/risco_retorno_ranking.py