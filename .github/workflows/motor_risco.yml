name: Atualiza Motor de Risco FIDC

on:
  schedule:
    # Roda automaticamente todo dia 15 do mês à 1h da manhã (UTC)
    - cron: '0 1 10 * *'
  workflow_dispatch: # Essa linha cria um botão para rodarmos manualmente quando quisermos!

jobs:
  rodar-motor:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar o código do repositório
      uses: actions/checkout@v4

    - name: 2. Preparar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. Instalar as bibliotecas (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Executar o Motor de Risco
      env:
        # Aqui o robô abre o cofre do GitHub e injeta a senha no código!
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        # Executa o script que está dentro da pasta scripts
        python scripts/motor_de_risco.py
