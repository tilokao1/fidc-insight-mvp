name: Pipeline Mensal de Dados FIDC

on:
  schedule:
    # Roda automaticamente todo dia 10 do mês à 1h da manhã (UTC)
    - cron: '0 1 10 * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  executar-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Baixar o código do repositório
      uses: actions/checkout@v4

    - name: 2. Preparar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: 3. Instalar Dependências (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Extrair e Sincronizar Dados da CVM (Últimos 12 meses)
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/atualizar_cvm.py

    - name: 5. Executar Limpeza de Dados (Null to Zero)
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: python scripts/limpeza_fidc.py
